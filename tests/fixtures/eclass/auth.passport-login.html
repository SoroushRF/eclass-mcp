<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Passport York Login</title>
  </head>
  <body>
    <main>
      <h1>Passport York Login</h1>
      <p>New to Passport York? Activate your account.</p>
      <form action="/ppylogin/ppylogin" method="post" name="loginform">
        <label for="username">Username</label>
        <input id="username" type="text" />
        <label for="password">Password</label>
        <input id="password" type="password" />
        <button type="submit">Log in</button>
      </form>
    </main>
  </body>
</html>
