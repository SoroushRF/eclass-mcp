# E01 + E02 — CI, lint, test (see docs/PROJECT_MASTER.md §2.9.1)
name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    timeout-minutes: 15
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `npm run build` runs `tsc` (typecheck + emit to dist); no separate --noEmit step.
      - name: Build
        run: npm run build

      - name: Typecheck (No Emit)
        run: npm run typecheck

      - name: Typecheck Tests (No Emit)
        run: npm run typecheck:tests

      - name: Lint
        run: npm run lint

      - name: Format Check
        run: npm run format:check

      - name: Test (Coverage)
        run: npm run test:coverage

      - name: Upload Coverage Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-node-${{ matrix.node-version }}
          path: coverage/

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
